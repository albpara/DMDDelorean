; PlatformIO Project Configuration
; DeLorean DMD - 128x32 HUB75 LED Matrix GIF Player
;
; Board: ESP32 DevKit (with optional PSRAM for double-buffer GIF preloading)
; Framework: Arduino

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git
    adafruit/Adafruit GFX Library
    bitbank2/AnimatedGIF@^2.1.1
    knolleary/PubSubClient@^2.8

; PSRAM is auto-detected at runtime.
; If your ESP32 module has PSRAM (e.g. WROVER), uncomment the lines below:
; board_build.psram = enabled
; build_flags =
;     -DBOARD_HAS_PSRAM
;     -mfix-esp32-psram-cache-issue
