name: PlatformIO Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build firmware
        shell: bash
        run: |
          set -o pipefail
          pio run 2>&1 | tee build_output.txt

      - name: Post memory usage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('build_output.txt', 'utf8');

            const flashMatch = output.match(/^\s*Flash:.*$/m);
            const ramMatch   = output.match(/^\s*RAM:.*$/m);

            const flashLine = flashMatch ? flashMatch[0].trim() : 'Flash: N/A';
            const ramLine   = ramMatch   ? ramMatch[0].trim()   : 'RAM:   N/A';

            const marker = '<!-- pio-memory-usage -->';
            const body = [
              marker,
              '## 📦 Firmware Memory Usage',
              '',
              '```',
              flashLine,
              ramLine,
              '```',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
